name: Bug report
description: Report a defect in qortara-governance-langchain
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. For security issues, do not file a public issue — see [SECURITY.md](../SECURITY.md).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the problem.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: The smallest snippet that reproduces the issue. Under 30 lines if possible.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include full stack traces if the SDK raised.
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.11.9"
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: qortara-governance-langchain version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: langchain-version
    attributes:
      label: langchain-core version
      placeholder: "0.3.x"
    validations:
      required: true

  - type: input
    id: langgraph-version
    attributes:
      label: langgraph version (if applicable)
      placeholder: "0.2.x"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.4 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I have searched existing issues for duplicates.
          required: true
        - label: I have confirmed this is not a security issue (security issues go to security@qortara.com).
          required: true
