name: Release

on:
  push:
    tags:
      - 'v*'

env:
  # Opt into Node.js 24 runtime for JavaScript actions before the June 2026
  # forced migration. Clears the Node 20 deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # PyPI trusted publishing via OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build wheel + sdist
        run: uv build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
